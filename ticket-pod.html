<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Context</title>
  <link rel="stylesheet" href="https://serviceops.connectwise.com/styles/cwstyle.css">
  <script src="ConnectWiseHostedAPI.1.0.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 10px 12px; font-family: Roboto, 'Segoe UI', sans-serif; font-size: 13px; color: #212121; background: #fff; }
    .section { margin-bottom: 10px; }
    .section-title { font-size: 11px; font-weight: bold; color: #026ccf; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
    .divider { border: none; border-top: 1px solid #e8e8e8; margin: 8px 0; }
    #company-name { font-size: 14px; font-weight: bold; color: #212121; margin-bottom: 4px; line-height: 1.3; }
    .meta-row { display: flex; gap: 14px; flex-wrap: wrap; }
    .meta-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.4px; }
    .meta-value { font-size: 12px; color: #424242; margin-top: 1px; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: bold; line-height: 16px; }
    .badge-green { background: #e8f5e9; color: #2e7d32; }
    .badge-grey { background: #f5f5f5; color: #9e9e9e; border: 1px solid #e0e0e0; }
    .count-pill { display: inline-block; background: #026ccf; color: #fff; border-radius: 10px; padding: 0 7px; font-size: 11px; font-weight: bold; line-height: 16px; min-width: 20px; text-align: center; }
    .count-pill.zero { background: #bdbdbd; }
    .ticket-list { margin: 0; padding: 0; list-style: none; }
    .ticket-list li { display: flex; align-items: baseline; gap: 6px; padding: 3px 0; border-bottom: 1px solid #f5f5f5; line-height: 1.4; }
    .ticket-list li:last-child { border-bottom: none; }
    .t-num { font-size: 12px; color: #026ccf; min-width: 40px; flex-shrink: 0; cursor: pointer; }
    .t-num:hover { text-decoration: underline; }
    .t-status { font-size: 11px; color: #9e9e9e; min-width: 72px; flex-shrink: 0; }
    .t-summary { font-size: 12px; color: #424242; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .no-tickets { font-size: 12px; color: #9e9e9e; padding: 2px 0; }
    .contact-name { font-size: 13px; font-weight: 500; color: #212121; }
    .contact-detail { font-size: 12px; color: #616161; margin-top: 2px; display: flex; align-items: center; gap: 5px; }
    .contact-detail .icon { color: #9e9e9e; font-size: 11px; }
    #state-loading { text-align: center; padding: 24px 0; color: #9e9e9e; font-size: 12px; }
    #state-loading .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #e0e0e0; border-top-color: #026ccf; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #state-error { display: none; background: #fff3cd; border: 1px solid #ffc107; border-radius: 4px; padding: 8px 10px; font-size: 12px; color: #856404; }
    #state-empty { display: none; font-size: 12px; color: #9e9e9e; padding: 16px 0; text-align: center; }
    #pod { display: none; }
    .btn-refresh { float: right; font-size: 11px; color: #026ccf; background: none; border: none; cursor: pointer; padding: 0; line-height: 1; }
    .btn-refresh:hover { text-decoration: underline; }
  </style>
</head>
<body>
<script>
  var CONFIG = {
    CW_ORIGIN: 'https://na.myconnectwise.net',
    // Replace with your Cloudflare Worker URL after deploying cloudflare-worker.js
    API_BASE: 'https://REPLACE_WITH_YOUR_WORKER_URL/v4_6_release/apis/3.0',
    MAX_OPEN_TICKETS: 5
  };
</script>
<div id="state-loading"><span class="spinner"></span> Loading…</div>
<div id="state-error"></div>
<div id="state-empty">No ticket loaded.</div>
<div id="pod">
  <div class="section">
    <div class="section-title">🏢 Company<button class="btn-refresh" onclick="reload()" title="Refresh">↻</button></div>
    <div id="company-name">—</div>
    <div class="meta-row" style="margin-top:5px;">
      <div class="meta-item"><div class="meta-label">Agreement</div><div id="agreement-status" class="meta-value">—</div></div>
      <div class="meta-item"><div class="meta-label">Territory</div><div id="company-territory" class="meta-value">—</div></div>
      <div class="meta-item"><div class="meta-label">Type</div><div id="company-type" class="meta-value">—</div></div>
    </div>
  </div>
  <hr class="divider">
  <div class="section">
    <div class="section-title">📋 Other Open Tickets<span id="open-count" class="count-pill zero">0</span></div>
    <ul id="ticket-list" class="ticket-list"><li><span class="no-tickets">None</span></li></ul>
  </div>
  <hr class="divider">
  <div class="section">
    <div class="section-title">👤 Contact</div>
    <div id="contact-name" class="contact-name">—</div>
    <div id="contact-email" class="contact-detail" style="display:none"><span class="icon">✉</span><span id="contact-email-val"></span></div>
    <div id="contact-phone" class="contact-detail" style="display:none"><span class="icon">☎</span><span id="contact-phone-val"></span></div>
  </div>
</div>
<script>
  'use strict';
  var _currentTicketId = null;
  var _cwApi = null;
  function showState(s) {
    document.getElementById('state-loading').style.display = s==='loading'?'':'none';
    document.getElementById('state-error').style.display   = s==='error'  ?'':'none';
    document.getElementById('state-empty').style.display   = s==='empty'  ?'':'none';
    document.getElementById('pod').style.display           = s==='pod'    ?'':'none';
  }
  function setError(msg) { document.getElementById('state-error').textContent='⚠ '+msg; showState('error'); }
  function setText(id,val,fb) { document.getElementById(id).textContent=val||fb||'—'; }
  function cwFetch(path,params) {
    var url=new URL(CONFIG.API_BASE+path);
    if(params) Object.keys(params).forEach(function(k){url.searchParams.set(k,params[k]);});
    return fetch(url.toString(),{headers:{'Content-Type':'application/json','Accept':'application/json'}})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status+' — '+path);return r.json();});
  }
  function renderCompany(t){var co=t.company||{};setText('company-name',co.name);setText('company-territory',t.territory?t.territory.name:null);setText('company-type',co.type?co.type.name:null);}
  function renderAgreement(ag){var el=document.getElementById('agreement-status');if(ag&&ag.length){var a=ag[0];var lb=(a.type&&a.type.name)?a.type.name:(a.name||'Active');el.innerHTML='<span class="badge badge-green">'+escHtml(lb)+'</span>';}else{el.innerHTML='<span class="badge badge-grey">None</span>';}}
  function renderTickets(tickets,cid){var others=tickets.filter(function(t){return t.id!==cid;});var c=document.getElementById('open-count');c.textContent=others.length;c.className='count-pill'+(others.length===0?' zero':'');var l=document.getElementById('ticket-list');if(!others.length){l.innerHTML='<li><span class="no-tickets">No other open tickets</span></li>';return;}l.innerHTML=others.slice(0,CONFIG.MAX_OPEN_TICKETS).map(function(t){var st=(t.status&&t.status.name)?t.status.name:'';var sm=t.summary||'';return'<li><span class="t-num" onclick="openTicket('+t.id+')">#'+t.id+'</span><span class="t-status">'+escHtml(st)+'</span><span class="t-summary" title="'+escAttr(sm)+'">'+escHtml(sm)+'</span></li>';}).join('');if(others.length>CONFIG.MAX_OPEN_TICKETS)l.innerHTML+='<li><span class="no-tickets">…and '+(others.length-CONFIG.MAX_OPEN_TICKETS)+' more</span></li>';}
  function renderContact(t,cd){var fn='',ln='';if(cd){fn=cd.firstName||'';ln=cd.lastName||'';}else{var pts=(t.contactName||'').split(' ');fn=pts[0]||'';ln=pts.slice(1).join(' ');}setText('contact-name',(fn+' '+ln).trim()||t.contactName);var em=null;if(cd&&cd.communicationItems){var ei=cd.communicationItems.find(function(c){return c.communicationType==='Email';});if(ei)em=ei.value;}if(!em)em=t.contactEmailAddress||null;if(em){document.getElementById('contact-email-val').textContent=em;document.getElementById('contact-email').style.display='';}else{document.getElementById('contact-email').style.display='none';}var ph=null;if(cd&&cd.communicationItems){var pi=cd.communicationItems.find(function(c){return['Phone','Direct','Mobile','Cell'].indexOf(c.communicationType)!==-1;});if(pi)ph=pi.value;}if(ph){document.getElementById('contact-phone-val').textContent=ph;document.getElementById('contact-phone').style.display='';}else{document.getElementById('contact-phone').style.display='none';}}
  function loadTicket(tid){if(!tid){showState('empty');return;}_currentTicketId=tid;showState('loading');cwFetch('/service/tickets/'+tid).then(function(t){renderCompany(t);var cid=t.company?t.company.id:null;var kid=t.contact?t.contact.id:null;return Promise.all([t,cid?cwFetch('/finance/agreements',{conditions:'company/id='+cid+' AND cancelledFlag=False',fields:'id,name,type',pageSize:5,orderBy:'id desc'}):Promise.resolve([]),cid?cwFetch('/service/tickets',{conditions:'company/id='+cid+' AND closedFlag=False',fields:'id,summary,status',pageSize:50,orderBy:'id desc'}):Promise.resolve([]),kid?cwFetch('/company/contacts/'+kid,{fields:'id,firstName,lastName,communicationItems'}):Promise.resolve(null)]);}).then(function(r){renderAgreement(r[1]);renderTickets(r[2],tid);renderContact(r[0],r[3]);showState('pod');}).catch(function(e){console.error('[Ticket Pod]',e);setError('Could not load data ('+e.message+'). Check console.');});}
  function reload(){if(_currentTicketId)loadTicket(_currentTicketId);}
  function openTicket(id){if(_cwApi)_cwApi.post({request:'openScreen',args:{newTab:false,screen:'ticket',id:id}});}
  function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function escAttr(s){return escHtml(s);}
  window.addEventListener('load',function(){
    var params=new URLSearchParams(window.location.search);
    var urlId=parseInt(params.get('id'),10)||null;
    if(typeof ConnectWiseHostedAPI!=='undefined'){try{_cwApi=new ConnectWiseHostedAPI(CONFIG.CW_ORIGIN,{eventHandlers:[{event:'onLoad',callback:function(d){console.log('[Ticket Pod] onLoad',d);if(d&&d.id)loadTicket(d.id);}},{event:'beforeSave',callback:function(d){d.onSuccess();}}]},false);console.log('[Ticket Pod] ConnectWiseHostedAPI initialized');}catch(e){console.warn('[Ticket Pod] init error:',e);}}
    if(urlId){loadTicket(urlId);}else{showState('empty');}
  });
</script>
</body>
</html>
